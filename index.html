<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle Clone - EN/AZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #121213;
            --tile-border: #3a3a3c;
            --tile-active: #878a8c;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --key: #818384;
        }
        body { background-color: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        header { border-bottom: 1px solid var(--tile-border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        #board-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; min-height: 0; }
        #board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; width: 100%; max-width: 350px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { aspect-ratio: 1; border: 2px solid var(--tile-border); display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; user-select: none; }
        .tile[data-state="active"] { border-color: var(--tile-active); }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); }
        .tile.present { background-color: var(--present); border-color: var(--present); }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); }
        
        /* Animations */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .flip { animation: flip 0.5s ease forwards; }
        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        #keyboard { width: 100%; max-width: 500px; margin: 0 auto; padding: 10px; padding-bottom: 20px; overflow-y: auto; max-height: 250px; }
        .k-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .key { background: var(--key); border-radius: 4px; height: 58px; flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; user-select: none; transition: 0.1s; min-width: 25px; }
        .key.wide { flex: 1.5; font-size: 0.8rem; }
        .key.correct { background: var(--correct); }
        .key.present { background: var(--present); }
        .key.absent { background: var(--absent); }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        #toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 20px; border-radius: 4px; font-weight: bold; z-index: 200; display: none; }
    </style>
</head>
<body>

<header>
    <div id="loader" class="text-xs text-gray-400">Loading...</div>
    <h1 class="text-3xl font-bold tracking-tighter">WORDLE</h1>
    <select id="lang-select" class="bg-transparent border border-gray-600 rounded px-2 py-1 text-sm outline-none">
        <option value="en">English</option>
        <option value="az">Azərbaycan</option>
    </select>
</header>

<div id="toast">Not in word list</div>

<div id="board-container">
    <div id="board"></div>
</div>

<div id="keyboard"></div>

<div id="modal">
    <div class="bg-[#121213] p-10 rounded-lg border border-[#3a3a3c] text-center max-w-sm w-full mx-4 shadow-2xl">
        <h2 id="m-status" class="text-3xl font-bold mb-2"></h2>
        <p class="text-gray-400 mb-1">The word was:</p>
        <p id="m-word" class="text-2xl tracking-[0.3em] font-bold mb-8 uppercase text-green-500"></p>
        <button onclick="initGame()" class="bg-white text-black font-bold py-3 px-10 rounded-md w-full active:scale-95 transition-transform">PLAY AGAIN</button>
    </div>
</div>

<script>
    // Dictionary Data
    let dictEN = ["CRANE", "APPLE", "HOUSE", "LIGHT", "BRAIN"]; // Initial fallback
    const dictAZ = [
        "ADINA", "MİLLİ", "KİTAB", "APREL", "DAXİL", "LİDER", "BİZİM", "ADLAR", "DİLİN", "ORFOQ", 
        "MANDA", "QOYUR", "ZAMAN", "VERİR", "CİDDİ", "XEYLİ", "VAFİQ", "YEVİN", "RİXLİ", "LİNİN", 
        "BUNUN", "NUNCU", "EPOSU", "HALDA", "TİMAL", "ZAKİR", "SEYİD", "SABİR", "ABBAS", "RUSCA", 
        "RANET", "PLYAJ", "VZVOD", "YUBKA", "NONİM", "NEOLO", "HOTEL", "SOYAD", "ALTUN", "QOBOY", 
        "SATİN", "SONRA", "RADIO", "İDMAN", "LİYEV", "FİDAN", "SABIŞ", "NADİR", "CAVİD", "BULUD", 
        "MOTOR", "POEMA", "SAİTİ", "ANKET", "APTEK", "FONEM", "KASET", "KAYUT", "FORMA", "NORMA", 
        "CİSİM", "FİKİR", "HEYİF", "QİSİM", "MEYİL", "SİNİF", "RAYON", "QUSAR", "QAZAX", "LERİK", 
        "SAMUX", "CULFA", "LİMAN", "MAXTA", "MAQOV", "TOVUZ", "MİLAX", "MİRİK", "MOSUL", "MUCUQ", 
        "MUXAS", "NABUR", "NADİL", "NOVLU", "NURAN", "NURSU", "ORAND", "PADAR", "PİRAL", "PİRAN", 
        "POYLU", "SAHİL", "SARAY", "SAROV", "SİRAB", "SİRİK", "SİYOV", "SUDUR", "SALAM", "DƏNİZ"
    ];

    const keysEN = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","DEL"]];
    const keysAZ = [["Q","Ü","E","R","T","Y","U","İ","O","P","Ö","Ğ"],["A","S","D","F","G","H","J","K","L","I","Ə"],["ENTER","Z","X","C","V","B","N","M","Ç","Ş","DEL"]];

    let target = "", currentGuess = "", attempts = [], isGameOver = false, isAnimating = false, keyColors = {};

    // Load massive dictionary
    async function loadDict() {
        try {
            const res = await fetch('https://raw.githubusercontent.com/charlesreid1/five-letter-words/master/sgb-words.txt');
            const data = await res.text();
            dictEN = data.toUpperCase().split('\n').filter(w => w.trim().length === 5);
            document.getElementById('loader').innerText = "Dict Ready";
            if (document.getElementById('lang-select').value === 'en') initGame();
        } catch (e) {
            document.getElementById('loader').innerText = "Offline Mode";
        }
    }

    function initGame() {
        const lang = document.getElementById('lang-select').value;
        const dict = lang === 'en' ? dictEN : dictAZ;
        target = dict[Math.floor(Math.random() * dict.length)];
        attempts = []; currentGuess = ""; isGameOver = false; isAnimating = false; keyColors = {};
        document.getElementById('modal').style.display = 'none';
        buildBoard();
        buildKeyboard();
    }

    function buildBoard() {
        const board = document.getElementById('board');
        board.innerHTML = "";
        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${i}`;
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
        }
    }

    function buildKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        const layout = document.getElementById('lang-select').value === 'en' ? keysEN : keysAZ;
        layout.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'k-row';
            row.forEach(key => {
                const btn = document.createElement('div');
                btn.className = `key ${key.length > 1 ? 'wide' : ''}`;
                btn.id = `k-${key}`;
                btn.innerText = key === 'DEL' ? '⌫' : key;
                btn.onclick = () => onKey(key);
                rowDiv.appendChild(btn);
            });
            kb.appendChild(rowDiv);
        });
    }

    function onKey(key) {
        if (isGameOver || isAnimating) return;
        if (key === 'DEL' || key === 'Backspace') {
            if (currentGuess.length > 0) {
                currentGuess = currentGuess.slice(0, -1);
                updateRow();
            }
        } else if (key === 'ENTER' || key === 'Enter') {
            submit();
        } else if (currentGuess.length < 5 && key.length === 1 && /^[a-zA-ZƏəÜüÖöĞğÇçŞşİı]$/.test(key)) {
            currentGuess += key.toUpperCase();
            updateRow();
        }
    }

    function updateRow() {
        const r = attempts.length;
        for (let i = 0; i < 5; i++) {
            const t = document.getElementById(`tile-${r}-${i}`);
            t.innerText = currentGuess[i] || "";
            t.setAttribute('data-state', currentGuess[i] ? 'active' : '');
        }
    }

    function submit() {
        if (currentGuess.length !== 5) return;
        const dict = document.getElementById('lang-select').value === 'en' ? dictEN : dictAZ;
        
        if (!dict.includes(currentGuess)) {
            showToast();
            const row = document.getElementById(`row-${attempts.length}`);
            row.classList.add('shake');
            setTimeout(() => row.classList.remove('shake'), 500);
            return;
        }

        reveal();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1500);
    }

    function reveal() {
        isAnimating = true;
        const r = attempts.length;
        const guess = currentGuess;
        const colors = getColors(guess);

        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                const t = document.getElementById(`tile-${r}-${i}`);
                t.classList.add('flip');
                setTimeout(() => {
                    t.classList.add(colors[i]);
                    updateKey(guess[i], colors[i]);
                    if (i === 4) {
                        attempts.push(guess);
                        currentGuess = "";
                        isAnimating = false;
                        checkEnd(guess);
                    }
                }, 250);
            }, i * 200);
        }
    }

    function getColors(guess) {
        let res = Array(5).fill('absent');
        let tArr = target.split('');
        guess.split('').forEach((c, i) => {
            if (c === tArr[i]) { res[i] = 'correct'; tArr[i] = null; }
        });
        guess.split('').forEach((c, i) => {
            if (res[i] !== 'correct' && tArr.includes(c)) {
                res[i] = 'present';
                tArr[tArr.indexOf(c)] = null;
            }
        });
        return res;
    }

    function updateKey(letter, color) {
        const k = document.getElementById(`k-${letter}`);
        if (!k) return;
        const rank = { absent: 1, present: 2, correct: 3 };
        const cur = keyColors[letter] ? rank[keyColors[letter]] : 0;
        if (rank[color] > cur) {
            keyColors[letter] = color;
            k.className = `key ${color}`;
        }
    }

    function checkEnd(guess) {
        if (guess === target) endGame(true);
        else if (attempts.length === 6) endGame(false);
    }

    function endGame(win) {
        isGameOver = true;
        document.getElementById('m-status').innerText = win ? "Genius!" : "Game Over";
        document.getElementById('m-word').innerText = target;
        document.getElementById('modal').style.display = 'flex';
    }

    window.onkeydown = (e) => onKey(e.key);
    document.getElementById('lang-select').onchange = initGame;
    
    loadDict();
    initGame();
</script>

</body>
</html>
